server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API routes proxy straight through to the FastAPI backend container —
    # mirrors the dev-server proxy list in vite.config.ts so relative API
    # calls ('/auth/login', '/pipeline/runs', ...) work identically in both
    # environments.
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /webhook/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        client_max_body_size 20M;
    }
    location /pipeline/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /lenders {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000;
    }

    # SPA fallback — client-side routing (React Router) owns everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
