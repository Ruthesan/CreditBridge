name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: creditbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest against SQLite (default)
        run: python -m pytest tests/ -v
        env:
          LLM_MODE: mock
          ENV: development

      - name: Run pytest against Postgres
        run: python -m pytest tests/ -v
        env:
          LLM_MODE: mock
          ENV: development
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/creditbridge_test

      - name: Run eval harness (agent pipeline golden cases)
        run: python -m evals.run_evals
        env:
          LLM_MODE: mock
          ENV: development

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npx vite build
